<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TED Talks 互动介绍</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="tag">Ideas Worth Spreading</p>
      <h1>TED Talks 互动介绍</h1>
      <p class="description">
        TED Talks 汇聚了来自科技、教育、设计、文化、商业等领域的精彩演讲。
        通过短小而有启发性的演讲，人们可以了解新观点、发现新灵感，并思考世界的更多可能性。
      </p>

      <div class="card">
        <h2>为什么 TED Talks 受欢迎？</h2>
        <ul>
          <li>内容简洁，适合快速了解一个主题。</li>
          <li>演讲者来自不同领域，观点丰富多元。</li>
          <li>适合学习英语、提升表达能力和拓展视野。</li>
        </ul>
      </div>

      <button id="checkButton" type="button">点击测试页面</button>
      <p id="message" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
